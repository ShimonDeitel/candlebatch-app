name: CandleBatch
options:
  bundleIdPrefix: com.shimondeitel.waxlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CandleBatch:
    type: application
    platform: iOS
    sources:
      - path: CandleBatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.waxlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CandleBatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CandleBatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CandleBatchTests
      - path: CandleBatch.storekit
    dependencies:
      - target: CandleBatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.waxlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CandleBatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CandleBatchUITests
    dependencies:
      - target: CandleBatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.waxlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CandleBatch:
    build:
      targets:
        CandleBatch: all
        CandleBatchTests: [test]
        CandleBatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CandleBatch.storekit
    test:
      config: Debug
      storeKitConfiguration: CandleBatch.storekit
      targets:
        - CandleBatchTests
        - CandleBatchUITests
    archive:
      config: Release
